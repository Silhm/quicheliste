name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build (tests + deploy folder)
        run: node deploy.mjs

      - name: Zip deploy folder
        run: cd deploy && zip -r ../quicheliste-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: quicheliste-${{ github.ref_name }}.zip
          generate_release_notes: true
